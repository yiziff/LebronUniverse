function head(title,sub,extra=''){return `<div class="head"><div><h1>${title}</h1><div class="muted">${sub}</div></div><div class="actions">${extra}</div></div>`}
function table(headers,rows){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function status(s){let cls=s==='Active'?'activeS':s==='Trial'||s==='Searching'?'trial':s==='Expired'||s==='Force Offline'?'offline':s.includes('Paid')?'paid':s.includes('Need')||s.includes('Pending')?'pending':s.includes('Soon')?'flag':'neutral';return `<span class="status ${cls}">${s}</span>`}
function bar(v,max){let p=Math.round(v/max*100);let cls=p>90?'danger':p>70?'warn':'';return `<div class="progress ${cls}"><span style="width:${Math.min(p,100)}%"></span></div><div class="mini">${p}%</div>`}
function kpi(label,num,trend,click){return `<div class="card kpi clickcard" onclick="${click}"><div class="label">${label}</div><div class="num">${num}</div><div class="trend ${trend[0]==='+'?'up':'warn'}">${trend}</div></div>`}

e','Package 1','RM500',status('Pending'),'2026-08-20','Draft Invoice'],['ORD-003','Mei Wong','MYD Pro Renewal','Package 1','RM730',status('Expired'),'2026-05-28','INV-003'],['ORD-004','Nur Aina','My Profile Design','Package 1','RM250',status('Paid'),'Completed','RCP-004'],['ORD-005','Ron Lim','Assistant Account','Package 2','RM90',status('Paid'),'2026-06-18','RCP-005'],['ORD-006','Jason Lee','Extra Storage','Package 4','RM120',status('Paid'),'2027-05-28','RCP-006']].map(r=>[...r,`<div class="actions"><button class="btn blue small" onclick="openOrder('${r[2]}')">Manage</button><button class="btn light small">Invoice</button><button class="btn green small">Receipt</button></div>`]))) }

function pendingSubmittedItem(v){

function locApprovePendingV15(id){let p=locPendingV15.find(x=>x.id===id);let rec=locCollectV15('locR');if(rec.recordCategory==='Property Name'){rec.id=`MYD-${rec.details.category==='Commercial'?'C':'R'}-${locStateCodeV15(rec.state)}-${String(locPropertyMasterV15.length+1).padStart(6,'0')}`;rec.recordCategory='Property Name';rec.aliases=p.variants.filter(v=>v[2]==='alias').map(v=>v[0]);rec.hidden=p.variants.filter(v=>v[2]==='hide').map(v=>v[0]);locPropertyMasterV15.push(rec)}else{rec.id=`MYD-AREA-${locStateCodeV15(rec.state)}-${String(locAreaMasterV15.length+1).padStart(5,'0')}`;rec.typeNote=rec.recordCategory;rec.aliases=p.variants.filter(v=>v[2]==='area'||v[2]==='street').map(v=>v[0]);locAreaMasterV15.push(rec)}locPendingV15=locPendingV15.filter(x=>x.id!==id);closeModal();renderLocation();toastMsg('Location approved into MYD Master Database')}
function locMergePendingV15(id){let p=locPendingV15.find(x=>x.id===id);let m=locPropertyMasterV15.find(x=>x.name===p.suggest)||locAreaMasterV15.find(x=>x.name===p.suggest);if(!m){toastMsg('No suggested match to merge');return}m.aliases=[...(m.aliases||[]),p.name];locPendingV15=locPendingV15.filter(x=>x.id!==id);closeModal();renderLocation();toastMsg('Merged into '+m.id)}
function locHidePendingV15(id){let p=locPendingV15.find(x=>x.id===id);locHiddenV15.push({name:p.name,reason:'Hidden by reviewer',linked:'-'});locPendingV15=locPendingV15.filter(x=>x.id!==id);closeModal();renderLocation();toastMsg('Hidden from frontend suggestions')}

function locSaveEditV15(id,kind){let list=kind==='property'?locPropertyMasterV15:locAreaMasterV15;let x=list.find(a=>a.id===id);Object.assign(x,locCollectV15('locE'));x.aliases=(document.getElementById('locEAliases')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);x.hidden=(document.getElementById('locEHidden')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);closeModal();renderLocation();toastMsg('Master record saved')}
function locArchiveV15(id,kind){let list=kind==='property'?locPropertyMasterV15:locAreaMasterV15;let x=list.find(a=>a.id===id);modal('Archive Record: '+x.name,'This hides it from frontend search without deleting history.',`<div class="alert"><b>Archive confirmation:</b> Existing listing history will remain linked. You can restore later.</div><label>Reason</label><textarea id="locArchiveReason" placeholder="Duplicate, wrong location, not valid property master"></textarea><div class="actions"><button class="btn red" onclick="locConfirmArchiveV15('${id}','${kind}')">Confirm Archive</button><button class="btn light" onclick="closeModal()">Cancel</button></div>`)}
function locConfirmArchiveV15(id,kind){let list=kind==='property'?locPropertyMasterV15:locAreaMasterV15;let x=list.find(a=>a.id===id);locArchivedV15.push({...x,archiveKind:kind,archiveReason:document.getElementById('locArchiveReason').value||'Archived master record',archivedAt:now});if(kind==='property')locPropertyMasterV15=locPropertyMasterV15.filter(a=>a.id!==id);else locAreaMasterV15=locAreaMasterV15.filter(a=>a.id!==id);closeModal();renderLocation();toastMsg('Record archived')}

function locOpenAddMasterV15(){let blank={name:'',type:'Apartment',street:'',township:'',city:'',postcode:'',state:'',details:{category:'Residential',propertyType:'High Rise Residences',subType:'Apartment',titleCategory:'Residential',tenure:'Freehold',facilities:[]}};modal('Add New MYD Master Record','Backend staff can add confirmed Property Name, City / Area, or Township directly. Similarity check appears while typing.',`${locBaseFieldsV15('locA',blank,'Property Name')}${locPropertyFormV15('locA',blank.details)}<div class="actions"><button class="btn green" onclick="locCreateMasterV15()">Approve / Add Master</button><button class="btn orange" onclick="toastMsg('Saved as pending');closeModal()">Save as Pending</button><button class="btn light" onclick="closeModal()">Cancel</button></div>`);locCategoryChangeV15('locA')}
function locCreateMasterV15(){let rec=locCollectV15('locA');if(rec.recordCategory==='Property Name'){rec.id=`MYD-${rec.details.category==='Commercial'?'C':'R'}-${locStateCodeV15(rec.state)}-${String(locPropertyMasterV15.length+1).padStart(6,'0')}`;rec.recordCategory='Property Name';locPropertyMasterV15.push(rec)}else{rec.id=`MYD-AREA-${locStateCodeV15(rec.state)}-${String(locAreaMasterV15.length+1).padStart(5,'0')}`;rec.typeNote=rec.recordCategory;locAreaMasterV15.push(rec)}closeModal();activeLocTab=rec.recordCategory==='Property Name'?'master':'area';renderLocation();toastMsg('New master record added')}

let activeNtfModule='All';
function modulePill(name,count){return `<button class="${activeNtfModule===name?'on':''}" onclick="activeNtfModule='${name}';renderNotifications()">${name}${count?` <span class="bubble">${count}</span>`:''}</button>`}
function renderNotifications(){
 const modules=['All','User Management','Listing Management','Location & Database','Finance & Accounting','Security & Support','System Announcement'];
 const rows=[
  ['NTF-201','Listing Management','Jason Lee','MYD-2026-000125','Listing Forced Offline','Unread','2026-06-06'],
  ['NTF-202','Finance & Accounting','Mei Wong','-','Subscription Expiry Reminder','Read','2026-06-01'],
  ['NTF-203','Location & Database','Ron Lim','MYD-2026-000129','Property Name Corrected','Unread','2026-06-07'],
  ['NTF-204','User Management','Jason Lee','-','REN / PEA Information Required','Unread','2026-06-07'],
  ['NTF-205','Security & Support','Angela Tan','-','Security Login Notice','Read','2026-06-06'],
  ['NTF-206','System Announcement','All Users','-','System Maintenance Notice','Draft','2026-06-08']
 ].filter(r=>activeNtfModule==='All'||r[1]===activeNtfModule);
 page.innerHTML=head('Notification Center','Context-based user notices. Each module uses its own fixed titles and standard messages, so admins do not send inconsistent wording.',`<button class="btn blue" onclick="openSendNotification('', '', 'System Announcement')">+ Send Notification</button>`)+
 `<div class="grid4">${kpi('Total Sent','1,280','All notifications')}${kpi('Unread','326','Need user action')}${kpi('Draft','8','Not sent yet')}${kpi('Failed','3','Retry needed')}</div><div class="tabs">${modules.map((m,i)=>modulePill(m,i?['',3,4,2,2,1,1][i]:0)).join('')}</div>`+
 table(['ID','Module','To','Related Listing','Title','Status','Date','Action'],rows.map(r=>[r[0],r[1],r[2],r[3],r[4],status(r[5]),r[6],`<div class="actions"><button class="btn blue small" onclick="openNotificationDetail('${r[0]}')">View</button><button class="btn light small" onclick="openSendNotification('', '${r[3]==='-'?'':r[3]}', '${r[1]}')">Use Template</button></div>`]));
}
function openSendNotification(uid='',listing='',module='Listing Management'){
 const mod=module && v17NotificationTemplates[module] ? module : 'Listing Management';
 modal('Send Notification · '+mod, v17NotificationTemplates[mod].subtitle, `<div class="grid2"><div><label>Module / Source Page</label><select id="ntfModule" onchange="refreshV17NtfModule()">${Object.keys(v17NotificationTemplates).map(x=>`<option ${x===mod?'selected':''}>${x}</option>`).join('')}</select></div><div><label>User / Recipient</label><select id="ntfUser">${['All Users'].concat(users.map(x=>x.name+' · '+x.id)).map(x=>`<option ${uid&&x.includes(uid)?'selected':''}>${x}</option>`).join('')}</select></div><div><label>Related Listing / Reference</label><input id="ntfListing" value="${listing||''}" placeholder="Listing No / Order ID / Ticket ID / optional"></div><div><label>Title Template</label><select id="ntfTitle" onchange="refreshV17NtfMsg()"></select><input id="ntfOtherTitle" style="display:none;margin-top:8px" placeholder="Other title"></div></div><label>Subtitle shown to user</label><input id="ntfSubtitle" placeholder="Short explanation shown under title"><label>User Message</label><textarea id="ntfMsg"></textarea><label>Admin Internal Remark</label><textarea id="ntfRemark" placeholder="Internal note for admin team only. User cannot see this."></textarea><div class="actions"><button class="btn green" onclick="sendV17Notification()">Send Now</button><button class="btn light" onclick="toastMsg('Saved as draft')">Save Draft</button><button class="btn light" onclick="closeModal()">Cancel</button></div>`);
 refreshV17NtfModule();
 if(listing && mod==='Listing Management'){ ntfTitle.value='Listing Forced Offline'; refreshV17NtfMsg(); }
}

function refreshV17NtfMsg(){const mod=ntfModule.value, title=ntfTitle.value; ntfOtherTitle.style.display=title==='Other'?'block':'none'; let msg=v17NotificationTemplates[mod].titles[title]||''; if(ntfListing.value) msg=`Reference: ${ntfListing.value}\n\n`+msg; ntfMsg.value=msg;}

abel>User Notification Message</label><textarea id="reportUserMsg">We received a report regarding your listing. Please review the issue and amend if required.</textarea><div class="actions"><button class="btn green" onclick="toastMsg('Report decision saved')">Save Decision</button><button class="btn orange" onclick="openSendNotification('${l.uid}','${l.no}','Listing Management')">Notify Listing Owner</button><button class="btn red" onclick="openForceOffline('${l.no}')">Force Offline</button><button class="btn light" onclick="toastMsg('Report dismissed')">Dismiss Report</button><button class="btn light" onclick="closeModal()">Close</button></div>`)
}
function refreshReportActionMsg(no){const d=reportDecision.value; reportUserMsg.value = d==='Send Warning Notification'?`Reference: ${no}\n\nYour listing has been reported. Please review the related issue and update your listing if necessary.`:d==='Force Offline Listing'?`Reference: ${no}\n\nYour listing will be forced offline due to a report that requires correction or verification.`:d==='Dismiss Report - No Violation'?`Reference: ${no}\n\nThe report has been reviewed and no violation was found.`:'Review evidence and follow up if more information is required.'}

 if(activeSetTab==='matrix') body=`<div class="info"><b>Permission Matrix:</b> tick what each department can view or operate. Use “View Only” for staff who should not change data.</div>`+table(['Module','Super Admin','Operation','Listing Review','Finance','Support','Developer'],[['Dashboard','Full','View','View','Finance KPI','View','System KPI'],['User Management','Full','Edit basic','View only','Billing info only','Basic support','Masked'],['Listing Management','Full','Force offline','Review / Force offline','No access','View support case','Masked'],['Location & Database','Full','Approve / Merge','Approve / Merge','No access','No access','No access'],['Finance & Accounting','Full','No edit','No access','Full finance','No edit','No access'],['Security & Support','Full','Review','Listing related','Payment ticket only','Full support','Technical logs'],['Notification Center','Full','Module template','Listing template','Finance template','Support template','System notice draft']].map(r=>r));
 if(activeSetTab==='audit') body=table(['Time','Admin','Action','Module','Target','IP','Result'],[['2026-06-07 10:21','Operation Staff A','Force Offline','Listing','MYD-2026-000125','60.50.2.8','Success'],['2026-06-07 09:40','Finance Staff A','Generated Receipt','Finance','RCP-004','60.50.2.9','Success'],['2026-06-06 18:30','Support Staff A','Sent Notification','Notification','USR-1004','118.101.44.8','Success'],['2026-06-06 15:10','Developer Vendor','Viewed Error Log','System','API timeout','203.82.11.5','Read only']].map(r=>r));
 if(activeSetTab==='system') body=`<div class="grid3"><div class="card"><b>System Settings</b><p class="muted">Maintenance mode, login rules, OTP settings, backup alert threshold.</p><button class="btn blue small" onclick="openSystemSetting('System Settings')">Manage</button></div><div class="card"><b>SEO & Public Page Control</b><p class="muted">Meta title, sitemap, public page visibility, canonical settings.</p><button class="btn blue small" onclick="openSystemSetting('SEO & Public Page Control')">Manage</button></div><div class="card"><b>Data Retention Rules</b><p class="muted">Deleted data recovery period, lead archive, audit log retention.</p><button class="btn blue small" onclick="openSystemSetting('Data Retention Rules')">Manage</button></div></div>`;
 page.innerHTML=head('Admin Settings','Company control room for admin staff, job roles, permissions, sensitive access and system settings.')+tabs+body;

function openRoleManage(role){modal('Manage Role: '+role,'Set what this role can view, edit, approve, export or recover.',`<div class="grid2"><div><label>Role Name</label><input value="${role}"><label>Department</label><select><option>Management</option><option>Operations</option><option>Finance</option><option>Support</option><option>IT / Developer</option></select><label>Status</label><select><option>Active</option><option>Inactive</option></select></div><div><label>Sensitive Data Access</label><select><option>Masked by default</option><option>Allowed with reason</option><option>Fully allowed</option><option>Not allowed</option></select><label>Export Permission</label><select><option>No export</option><option>Export own module only</option><option>Export with Super Admin approval</option></select><label>Approval Required</label><select><option>No</option><option>Yes - Super Admin approval</option></select></div></div><div class="section-title">Module Permissions</div><div class="grid3"><label><input type="checkbox" style="width:auto" checked> User Management</label><label><input type="checkbox" style="width:auto" checked> Listing Management</label><label><input type="checkbox" style="width:auto"> Finance & Accounting</label><label><input type="checkbox" style="width:auto" checked> Location & Database</label><label><input type="checkbox" style="width:auto"> Recovery / Audit</label><label><input type="checkbox" style="width:auto" checked> Notification Center</label></div><label>Internal Remark</label><textarea>Permission changes must be recorded in Admin Action Log.</textarea><div class="actions"><button class="btn green" onclick="toastMsg('Role permission saved')">Save Permission</button><button class="btn light" onclick="closeModal()">Cancel</button></div>`)}
function openAdminStaff(id){const a=adminStaff.find(x=>x[0]===id)||['NEW','New Admin','','Operations','','Active'];modal((id==='new'?'+ Add':'Manage')+' Admin User','Create staff access and assign role carefully.',`<div class="grid2"><div><label>Full Name</label><input value="${a[1]}"><label>Email</label><input placeholder="admin@mydproperty.com.my"><label>Department</label><select><option>Operations</option><option>Finance</option><option>Support</option><option>IT / Developer</option><option>Management</option></select></div><div><label>Role</label><select>${roleMatrix.map(r=>`<option ${a[2]===r[0]?'selected':''}>${r[0]}</option>`).join('')}</select><label>Status</label><select><option>Active</option><option>Temporary</option><option>Suspended</option></select><label>Two-Factor Required</label><select><option>Yes</option><option>No</option></select></div></div><label>Access Expiry / Temporary Vendor Access</label><input type="date"><label>Admin Remark</label><textarea>Reason for access / job scope.</textarea><div class="actions"><button class="btn green" onclick="toastMsg('Admin user saved')">Save Admin</button><button class="btn orange" onclick="toastMsg('Password reset email sent')">Force Password Reset</button><button class="btn red" onclick="toastMsg('Admin suspended')">Suspend Access</button><button class="btn light" onclick="closeModal()">Cancel</button></div>`)}
function openAdminActivity(id){modal('Admin Activity: '+id,'Review what this admin viewed or changed.',table(['Time','Module','Action','Target','Result'],[['2026-06-07 10:21','Listing','Force Offline','MYD-2026-000125','Success'],['2026-06-07 10:18','Notification','Send Notice','USR-1004','Success'],['2026-06-07 09:55','User','View Details','USR-1004','Read']].map(r=>r))+`<div class="actions"><button class="btn light" onclick="closeModal()">Close</button></div>`)}
function openSystemSetting(name){modal(name,'System-level configuration. Only Super Admin should edit these settings.',`<div class="grid2"><div><label>Setting Group</label><input value="${name}"><label>Status</label><select><option>Active</option><option>Draft</option><option>Disabled</option></select></div><div><label>Change Requires Approval</label><select><option>Yes</option><option>No</option></select><label>Notify Admins</label><select><option>Yes</option><option>No</option></select></div></div><label>Setting Details</label><textarea>Example: maintenance mode window, SEO rule, data retention days, backup alert threshold.</textarea><div class="actions"><button class="btn green" onclick="toastMsg('System setting saved')">Save Setting</button><button class="btn light" onclick="closeModal()">Cancel</button></div>`)}

let activeTab='pending';
function addr(x){return [x.street,x.township,x.city,x.postcode,x.state].filter(Boolean).join(', ')}
function completion(x){let det=x.details||{};let fields=[x.name,x.type,x.street,x.township,x.city,x.postcode,x.state,x.map,det.category,det.propertyType,det.subType,det.titleCategory,det.tenure,det.completionYear,det.developer,det.totalUnits,(det.facilities||[]).length];if(det.tenure==='Leasehold')fields.push(det.leaseEndYear);return Math.round(fields.filter(v=>v&&v!==0).length/fields.length*100)}
function refreshFPropertyType(){fPropertyType.innerHTML=Object.keys(categoryTypes[fCategory.value]).map(x=>`<option>${x}</option>`).join('');refreshFSubType()}
function refreshFSubType(){fSubType.innerHTML=categoryTypes[fCategory.value][fPropertyType.value].map(x=>`<option>${x}</option>`).join('')}
function locDBShowPage(p){ if(typeof renderBackend==='function') renderBackend(); }
function iconFor(type){if(['Flat','Apartment','Condominium','Service Residence'].includes(type))return '▦';if(['Bungalow','Zero-Lot Bungalow','Link Bungalow','Town Villa','Semi-Detached House','Cluster House'].includes(type))return '⌂';if(type.includes('Terrace')||type==='Townhouse')return '▤';if(type.includes('Land'))return '◇';if(['Office','Shop','Shop/Office','Retail Space','Retail Office','Sofo','Soho','Sovo'].includes(type))return '▥';if(type.includes('Factory')||type==='Warehouse')return '▣';if(type==='Hotel / Resort')return '♨';return '⌖'}
function renderFrontResults(){if(!frontResults)return;const q=(frontSearch.value||'').toLowerCase();if(!q){frontResults.innerHTML='<div class="empty">Start typing to search.</div>';return}let items=[...propertyMaster.map(x=>({...x,showType:x.type,kind:'Property Name'})),...areaMaster.map(x=>({...x,showType:x.typeNote,kind:x.recordCategory}))].filter(x=>(x.name+' '+(x.aliases||[]).join(' ')+' '+x.city+' '+x.township).toLowerCase().includes(q));frontResults.innerHTML=`<div class="results">${items.map(x=>`<div class="result-item" onclick="alert('Selected: ${x.name}')"><div class="ico">${iconFor(x.showType)}</div><div><b>${highlight(x.name,q)}</b><div class="muted">${addr(x)}</div></div><div class="type-pill">${x.showType}</div></div>`).join('')||'<div class="empty">No MYD record found. User can continue manual entry.</div>'}</div>`}
function highlight(text,q){if(!q)return text;return text.replace(new RegExp(q,'ig'),m=>`<span style="color:#1267d6">${m}</span>`)}
function setTab(t,e){activeTab=t;document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');renderBackend()}
function renderBackend(){kPending.innerText=pending.length;kProperty.innerText=propertyMaster.length;kArea.innerText=areaMaster.length;kCompletion.innerText=Math.round(propertyMaster.reduce((s,x)=>s+completion(x),0)/propertyMaster.length)+'%';if(activeTab==='pending')renderPending();if(activeTab==='property')renderProperty();if(activeTab==='area')renderArea();if(activeTab==='hidden')renderHidden()}
function findMatch(p){return [...propertyMaster,...areaMaster].find(x=>x.id===p.suggest)}
function renderPending(){backendContent.innerHTML=`<div class="note"><b>Review rule:</b> Type always displays the user's selected Property Sub Type from Create Listing (Example: Apartment, Condominium, Office, Factory, Terrace House). Backend only classifies whether the name belongs under Property Name, City / Area, or Township.</div><div class="table-wrap"><table><thead><tr><th>Status</th><th>Detected Name</th><th>Suggested Match</th><th>Type Title</th><th>Address</th><th>Completion</th><th>Action</th></tr></thead><tbody>${pending.map(p=>{let m=findMatch(p);return `<tr><td><span class="status ${p.status.includes('Merge')?'merge':'pending'}">${p.status}</span></td><td><b>${p.name}</b><div class="muted">${p.source}</div></td><td>${m?`<span class="badge match">${p.status.includes('Merge')?'88':'72'}% match</span><div class="muted">${m.id} · ${m.name}</div>`:'-'}</td><td><b>${p.type}</b></td><td>${addr(p)}</td><td><div class="progress"><span style="width:${completion(p)}%"></span></div><span class="small-muted">${completion(p)}%</span></td><td><button class="btn blue small" onclick="openReview('${p.pid}')">Review & Classify</button></td></tr>`}).join('')}</tbody></table></div>`}
function renderProperty(){backendContent.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Property ID</th><th>Name</th><th>Type Title</th><th>Address</th><th>Map</th><th>Details</th><th>Completion</th><th>Action</th></tr></thead><tbody>${propertyMaster.map(x=>`<tr><td><b>${x.id}</b></td><td>${x.name}<div class="muted">Aliases: ${(x.aliases||[]).join(', ')}</div></td><td><b>${x.type}</b></td><td>${addr(x)}</td><td>${x.map}</td><td>${x.details.category} · ${x.details.propertyType} · ${x.details.subType}</td><td><div class="progress"><span style="width:${completion(x)}%"></span></div><span class="small-muted">${completion(x)}%</span></td><td><button class="btn light small" onclick="openEdit('${x.id}','property')">Edit</button> <button class="btn blue small" onclick="openMerge('${x.id}')">Merge</button></td></tr>`).join('')}</tbody></table></div>`}
function renderArea(){backendContent.innerHTML=`<div class="note"><b>Area & Township Master:</b> These are backend classifications only. Users still create property listings and select Property Sub Type.</div><div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Record Category</th><th>Address Hierarchy</th><th>Aliases</th><th>Used</th><th>Action</th></tr></thead><tbody>${areaMaster.map(x=>`<tr><td><b>${x.id}</b></td><td>${x.name}</td><td>${x.recordCategory}</td><td>${addr(x)}</td><td>${(x.aliases||[]).join(', ')}</td><td>${x.used}</td><td><button class="btn light small" onclick="openEdit('${x.id}','area')">Edit</button></td></tr>`).join('')}</tbody></table></div>`}
function renderHidden(){backendContent.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Name</th><th>Reason</th><th>Linked Record</th><th>Action</th></tr></thead><tbody>${hiddenNames.map((x,i)=>`<tr><td>${x.name}</td><td>${x.reason}</td><td>${x.linked}</td><td><button class="btn light small" onclick="restoreHidden(${i})">Restore to Pending</button></td></tr>`).join('')}</tbody></table></div>`}
function recordCategoryOptions(selected='Property Name'){return ['Property Name','City / Area','Township'].map(x=>`<option ${x===selected?'selected':''}>${x}</option>`).join('')}
function propertyForm(prefix,det){return `<div id="${prefix}PropertyDetails"><div class="section-title">Fixed Property Details</div><div class="grid4"><div><label>Category</label><select id="${prefix}Category" onchange="refreshPropertyType('${prefix}')"><option ${det.category==='Residential'?'selected':''}>Residential</option><option ${det.category==='Commercial'?'selected':''}>Commercial</option></select></div><div><label>Property Type</label><select id="${prefix}PropertyType" onchange="refreshSubType('${prefix}')"></select></div><div><label>Property Sub Type</label><select id="${prefix}SubType" onchange="syncTypeFromSub('${prefix}')"></select></div><div><label>Land Title Category</label><select id="${prefix}TitleCategory"><option ${det.titleCategory==='Residential'?'selected':''}>Residential</option><option ${det.titleCategory==='Commercial'?'selected':''}>Commercial</option><option ${det.titleCategory==='Mix Development'?'selected':''}>Mix Development</option><option ${det.titleCategory==='Industrial'?'selected':''}>Industrial</option></select></div><div><label>Tenure</label><select id="${prefix}Tenure" onchange="toggleLease('${prefix}')"><option ${det.tenure==='Freehold'?'selected':''}>Freehold</option><option ${det.tenure==='Leasehold'?'selected':''}>Leasehold</option></select></div><div id="${prefix}LeaseBox" class="grid2" style="display:${det.tenure==='Leasehold'?'grid':'none'};grid-column:span 2"><div><label>Leasehold Remaining Years</label><input id="${prefix}LeaseRemain" disabled value="${det.leaseEndYear?Math.max(0,parseInt(det.leaseEndYear)-CURRENT_YEAR)+' years':'Auto calculated'}"></div><div><label>Lease Expiry Year</label><input id="${prefix}LeaseEnd" value="${det.leaseEndYear||''}" oninput="calcLease('${prefix}')" placeholder="e.g. 2101"></div></div><div><label>Completion Year</label><input id="${prefix}Completion" value="${det.completionYear||''}"></div><div><label>Developer</label><input id="${prefix}Developer" value="${det.developer||''}"></div><div><label>Total Units / Lots</label><input id="${prefix}Units" value="${det.totalUnits||''}"></div></div><div class="section-title">Property Facilities</div><div class="facility-wrap" id="${prefix}FacilitiesBox">${facilities.map(f=>`<button type="button" class="facility ${(det.facilities||[]).includes(f)?'selected':''}" onclick="toggleFac('${prefix}','${f.replace(/'/g,"\\'")}')">${f}</button>`).join('')}${(det.facilities||[]).filter(f=>!facilities.includes(f)).map(f=>`<button type="button" class="facility selected custom" onclick="removeFac('${prefix}','${f}')">${f}<span class="x">×</span></button>`).join('')}</div><input id="${prefix}Facilities" type="hidden" value="${(det.facilities||[]).join(', ')}"><div class="grid2" style="margin-top:12px"><input id="${prefix}NewFacility" placeholder="Add property facility, e.g. 7-Eleven"><button class="btn light" onclick="addFac('${prefix}')">+ Add property facilities</button></div></div>`}
function refreshPropertyType(prefix){let cat=document.getElementById(prefix+'Category').value;let pt=document.getElementById(prefix+'PropertyType');pt.innerHTML=Object.keys(categoryTypes[cat]).map(x=>`<option>${x}</option>`).join('');refreshSubType(prefix)}
function refreshSubType(prefix,selected=''){let cat=document.getElementById(prefix+'Category').value;let pt=document.getElementById(prefix+'PropertyType').value;let st=document.getElementById(prefix+'SubType');st.innerHTML=categoryTypes[cat][pt].map(x=>`<option ${x===selected?'selected':''}>${x}</option>`).join('');syncTypeFromSub(prefix)}
function initPropertyDropdown(prefix,det){document.getElementById(prefix+'Category').value=det.category||'Residential';refreshPropertyType(prefix);document.getElementById(prefix+'PropertyType').value=det.propertyType||Object.keys(categoryTypes[det.category||'Residential'])[0];refreshSubType(prefix,det.subType)}
function syncTypeFromSub(prefix){let typeInput=document.getElementById(prefix+'Type');let sub=document.getElementById(prefix+'SubType');if(typeInput&&sub)typeInput.value=sub.value}
function toggleLease(prefix){let box=document.getElementById(prefix+'LeaseBox');box.style.display=document.getElementById(prefix+'Tenure').value==='Leasehold'?'grid':'none';calcLease(prefix)}
function calcLease(prefix){let v=parseInt(document.getElementById(prefix+'LeaseEnd')?.value||'',10);let out=document.getElementById(prefix+'LeaseRemain');if(out)out.value=Number.isFinite(v)?Math.max(0,v-CURRENT_YEAR)+' years':'Auto calculated'}
function getFac(prefix){return document.getElementById(prefix+'Facilities').value.split(',').map(x=>x.trim()).filter(Boolean)}
function setFac(prefix,arr){document.getElementById(prefix+'Facilities').value=arr.join(', ');let box=document.getElementById(prefix+'FacilitiesBox');box.innerHTML=facilities.map(f=>`<button type="button" class="facility ${arr.includes(f)?'selected':''}" onclick="toggleFac('${prefix}','${f.replace(/'/g,"\\'")}')">${f}</button>`).join('')+arr.filter(f=>!facilities.includes(f)).map(f=>`<button type="button" class="facility selected custom" onclick="removeFac('${prefix}','${f}')">${f}<span class="x">×</span></button>`).join('')}
function toggleFac(prefix,f){let arr=getFac(prefix);arr=arr.includes(f)?arr.filter(x=>x!==f):[...arr,f];setFac(prefix,arr)}
function addFac(prefix){let v=document.getElementById(prefix+'NewFacility').value.trim();if(!v)return;let arr=getFac(prefix);if(!arr.includes(v))arr.push(v);document.getElementById(prefix+'NewFacility').value='';setFac(prefix,arr)}
function removeFac(prefix,f){setFac(prefix,getFac(prefix).filter(x=>x!==f))}
function categoryChange(prefix){let rc=document.getElementById(prefix+'RecordCategory').value;let details=document.getElementById(prefix+'PropertyDetails');let action=document.getElementById(prefix+'MainAction');if(rc==='Property Name'){details.style.display='block';action.textContent='Approve as Property Name'}else{details.style.display='none';action.textContent='Save as Area & Township'} }
function variantList(p){return p.variants.map((v,i)=>`<div class="variant-row ${v[2]==='hide'?'hide':v[2]==='area'||v[2]==='street'?'area':'alias'}"><div><b>${v[0]}</b><div class="muted">${v[1]}</div></div><select class="vAction"><option value="alias" ${v[2]==='alias'?'selected':''}>Same Property Name / Add as Alias</option><option value="new" ${v[2]==='new'?'selected':''}>Different Property / Create New Record</option><option value="area" ${v[2]==='area'?'selected':''}>City / Area Name</option><option value="street" ${v[2]==='street'?'selected':''}>Township Name</option><option value="hide" ${v[2]==='hide'?'selected':''}>Not Property / Hide Suggestion</option></select><span class="badge ${v[2]==='hide'?'hidden':v[2]==='area'||v[2]==='street'?'area':'property'}">Review</span></div>`).join('')}
function openReview(pid){let p=pending.find(x=>x.pid===pid);let m=findMatch(p);let left=`<div class="compare-card"><h3>User Submitted Record</h3>${baseFields('r',p,'Property Name')}<div class="mapbox"><b>Map Verification</b><div class="grid2"><div><label>Latitude</label><input id="rLat" value="${p.lat||''}"></div><div><label>Longitude</label><input id="rLng" value="${p.lng||''}"></div></div><div class="form-actions"><button class="btn blue small" onclick="alert('Demo: open Google Map')">View Map</button><button class="btn green small" onclick="alert('Map pin confirmed')">Confirm Pin</button></div></div></div>`;let right=m?`<div class="compare-card existing"><h3>Suggested Existing Master</h3><div class="grid2"><div><label>ID</label><input disabled value="${m.id}"></div><div><label>Name</label><input disabled value="${m.name}"></div><div><label>Type</label><input disabled value="${m.type||m.typeNote}"></div><div><label>Record Category</label><input disabled value="${m.recordCategory}"></div></div><div class="note"><b>Aliases:</b> ${(m.aliases||[]).join(', ')}<br><b>Address:</b> ${addr(m)}<br><b>Completion:</b> ${m.details?completion(m):'-'}%</div></div>`:`<div class="compare-card existing"><h3>No Suggested Master</h3><div class="empty">Create new Property Name or save as Area & Township.</div></div>`;openModal('Review & Classify: '+p.name,'Type shows user selected Property Sub Type. Backend chooses Record Category.',`<div class="alert"><b>Possible duplicate:</b> ${m?'Match with '+m.id+' · '+m.name:'No strong duplicate found.'}</div><div class="compare">${left}${right}</div><div class="section-title">Variant Classification</div>${variantList(p)}${propertyForm('r',p.details)}<div class="form-actions"><button id="rMainAction" class="btn green" onclick="approveReview('${pid}')">Approve as Property Name</button><button class="btn orange" onclick="savePending('${pid}')">Save as Pending Status</button><button class="btn blue" onclick="mergeReview('${pid}')">Merge into Suggested Match</button><button class="btn red" onclick="hidePending('${pid}')">Hide / Not Property</button></div>`);initPropertyDropdown('r',p.details);categoryChange('r')}
function baseFields(prefix,x,rc){return `<div class="grid4"><div><label>Master Name</label><input id="${prefix}Name" value="${x.name}"></div><div><label>Record Category</label><select id="${prefix}RecordCategory" onchange="categoryChange('${prefix}')">${recordCategoryOptions(rc)}</select></div><div><label>Type Title</label><input id="${prefix}Type" value="${x.type}" readonly></div><div><label>Postal Code</label><input id="${prefix}Postcode" value="${x.postcode}"></div><div><label>Street</label><input id="${prefix}Street" value="${x.street}"></div><div><label>Township</label><input id="${prefix}Township" value="${x.township}"></div><div><label>City</label><input id="${prefix}City" value="${x.city}"></div><div><label>State</label><input id="${prefix}State" value="${x.state}"></div></div><div class="instant"><b>Instant Similarity Check</b><div class="muted">System checks similar Property Name / Area / Township while typing.</div></div>`}
function recordCategoryOptions(sel){return ['Property Name','City / Area','Township'].map(x=>`<option ${x===sel?'selected':''}>${x}</option>`).join('')}
function collectReview(prefix){let det={category:document.getElementById(prefix+'Category')?.value,propertyType:document.getElementById(prefix+'PropertyType')?.value,subType:document.getElementById(prefix+'SubType')?.value,titleCategory:document.getElementById(prefix+'TitleCategory')?.value,tenure:document.getElementById(prefix+'Tenure')?.value,leaseEndYear:document.getElementById(prefix+'LeaseEnd')?.value,completionYear:document.getElementById(prefix+'Completion')?.value,developer:document.getElementById(prefix+'Developer')?.value,totalUnits:document.getElementById(prefix+'Units')?.value,facilities:getFac(prefix)};return{name:document.getElementById(prefix+'Name').value,recordCategory:document.getElementById(prefix+'RecordCategory').value,type:document.getElementById(prefix+'Type').value,street:document.getElementById(prefix+'Street').value,township:document.getElementById(prefix+'Township').value,city:document.getElementById(prefix+'City').value,postcode:document.getElementById(prefix+'Postcode').value,state:document.getElementById(prefix+'State').value,details:det,aliases:[],hidden:[]}}
function approveReview(pid){let p=pending.find(x=>x.pid===pid);let rec=collectReview('r');if(rec.recordCategory==='Property Name'){rec.id='MYD-'+(rec.state==='Selangor'?'SL':'KL')+'-'+String(propertyMaster.length+1).padStart(6,'0');rec.map='Not Verified';rec.aliases=p.variants.filter(v=>v[2]==='alias').map(v=>v[0]);rec.hidden=p.variants.filter(v=>v[2]==='hide').map(v=>v[0]);propertyMaster.push(rec)}else{rec.id='MYD-AREA-'+(rec.state==='Selangor'?'SL':'KL')+'-'+String(areaMaster.length+1).padStart(5,'0');rec.typeNote=rec.recordCategory;rec.used=1;rec.aliases=p.variants.filter(v=>v[2]==='area'||v[2]==='street').map(v=>v[0]);areaMaster.push(rec)}pending=pending.filter(x=>x.pid!==pid);closeModal();renderBackend()}
function savePending(pid){let rec=collectReview('r');let p=pending.find(x=>x.pid===pid);Object.assign(p,{name:rec.name,type:rec.type,street:rec.street,township:rec.township,city:rec.city,postcode:rec.postcode,state:rec.state,details:rec.details});closeModal();renderBackend();alert('Saved changes but kept in Pending / Merge Needed.')}
function mergeReview(pid){let p=pending.find(x=>x.pid===pid);let m=findMatch(p);if(!m){alert('No suggested match to merge.');return}p.variants.forEach(v=>{if(v[2]==='alias'&&!m.aliases.includes(v[0]))m.aliases.push(v[0]);if(v[2]==='hide')hiddenNames.push({name:v[0],reason:'Not a property name',linked:m.id})});pending=pending.filter(x=>x.pid!==pid);closeModal();renderBackend();alert('Merged into '+m.id)}
function hidePending(pid){let p=pending.find(x=>x.pid===pid);hiddenNames.push({name:p.name,reason:'Hidden by reviewer',linked:'-'});pending=pending.filter(x=>x.pid!==pid);closeModal();renderBackend()}
function openEdit(id,kind){let list=kind==='property'?propertyMaster:areaMaster;let x=list.find(i=>i.id===id);openModal('Edit Record: '+x.name,'Approved records remain editable.',`${baseFields('e',x,x.recordCategory)}${kind==='property'?propertyForm('e',x.details):''}<div class="grid2"><div><label>Aliases</label><textarea id="eAliases">${(x.aliases||[]).join(', ')}</textarea></div><div><label>Hidden / Not Property Names</label><textarea id="eHidden">${(x.hidden||[]).join(', ')}</textarea></div></div><div class="form-actions"><button class="btn green" onclick="saveEdit('${id}','${kind}')">Save Changes</button><button class="btn red" onclick="archiveRecord('${id}','${kind}')">Archive / Hide</button></div>`);if(kind==='property')initPropertyDropdown('e',x.details);categoryChange('e')}
function saveEdit(id,kind){let list=kind==='property'?propertyMaster:areaMaster;let x=list.find(i=>i.id===id);let rec=collectReview('e');Object.assign(x,rec);x.aliases=eAliases.value.split(',').map(s=>s.trim()).filter(Boolean);x.hidden=eHidden.value.split(',').map(s=>s.trim()).filter(Boolean);closeModal();renderBackend()}
function archiveRecord(id,kind){let list=kind==='property'?propertyMaster:areaMaster;let x=list.find(i=>i.id===id);hiddenNames.push({name:x.name,reason:'Archived master record',linked:id});if(kind==='property')propertyMaster=propertyMaster.filter(i=>i.id!==id);else areaMaster=areaMaster.filter(i=>i.id!==id);closeModal();renderBackend()}
function openMerge(id){openModal('Merge Manager','Select records to merge into '+id,`<div class="note">Demo merge manager: use this to combine duplicate approved records or pending variants.</div><div class="form-actions"><button class="btn blue" onclick="alert('Selected records merged in demo.')">Confirm Merge</button></div>`)}
function openAddMaster(){let blank={name:'',type:'Apartment',street:'',township:'',city:'',postcode:'',state:'',details:d()};openModal('Add New MYD Master Record','Backend staff can add confirmed Property Name, City / Area, or Township directly. Similarity check appears while typing.',`${baseFields('a',blank,'Property Name')}${propertyForm('a',blank.details)}<div class="form-actions"><button id="aMainAction" class="btn green" onclick="createMaster()">Approve as Property Name</button><button class="btn orange" onclick="alert('Saved as pending status in demo.')">Save as Pending Status</button><button class="btn light" onclick="closeModal()">Cancel</button></div>`);initPropertyDropdown('a',blank.details);categoryChange('a')}
function createMaster(){let rec=collectReview('a');if(rec.recordCategory==='Property Name'){rec.id='MYD-'+(rec.state==='Selangor'?'SL':'KL')+'-'+String(propertyMaster.length+1).padStart(6,'0');rec.aliases=[];rec.hidden=[];rec.map='Not Verified';propertyMaster.push(rec)}else{rec.id='MYD-AREA-'+(rec.state==='Selangor'?'SL':'KL')+'-'+String(areaMaster.length+1).padStart(5,'0');rec.typeNote=rec.recordCategory;rec.aliases=[];rec.used=0;areaMaster.push(rec)}closeModal();locDBShowPage('backend');renderBackend()}
function restoreHidden(i){let h=hiddenNames[i];pending.push({pid:'P'+Date.now(),status:'Pending',name:h.name,source:'Restored Hidden Name',suggest:'',type:'Apartment',street:'',township:'',city:'',postcode:'',state:'',variants:[[h.name,'Restored','new']],details:d()});hiddenNames.splice(i,1);renderBackend()}
function openModal(t,s,b){modalTitle.innerText=t;modalSub.innerText=s;modalBody.innerHTML=b;modalBg.style.display='flex'}function closeModal(){modalBg.style.display='none'}modalBg.addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal()});

/* === MYD V8 Master Governance overrides requested by user === */
let archivedRecords = [];
const variantConfirmState = {};
function categoryShort(x){return (x.details&&x.details.category)||x.category||''}
function stateCode(state){const map={'Kuala Lumpur':'KL','Selangor':'SL','Penang':'PG','Johor':'JH','Negeri Sembilan':'NS','Perak':'PK','Melaka':'MK','Pahang':'PH','Sabah':'SB','Sarawak':'SW'};return map[state]||'MY'}
function nextPropertyId(rec){const cat=(rec.details&&rec.details.category)==='Commercial'?'C':'R';return `MYD-${cat}-${stateCode(rec.state)}-${String(propertyMaster.length+1).padStart(6,'0')}`}
function usedCount(x){return x.used || Math.max(1, ((x.name||'').length*7)%320)}
function filterHtmlProperty(){return `<div class="filter-panel"><input id="pfSearch" placeholder="Search name, alias, address" oninput="renderProperty()"><select id="pfCat" onchange="renderProperty()"><option value="">Residential / Commercial</option><option>Residential</option><option>Commercial</option></select><select id="pfState" onchange="renderProperty()"><option value="">All States</option>${[...new Set(propertyMaster.map(x=>x.state).filter(Boolean))].map(x=>`<option>${x}</option>`).join('')}</select><select id="pfSub" onchange="renderProperty()"><option value="">Property Sub Type</option>${[...new Set(propertyMaster.map(x=>x.type).filter(Boolean))].map(x=>`<option>${x}</option>`).join('')}</select><select id="pfComplete" onchange="renderProperty()"><option value="">Completion</option><option value="not100">Not 100%</option><option value="100">100%</option><option value="low">Below 80%</option></select><select id="pfMap" onchange="renderProperty()"><option value="">Map Status</option><option>Map Verified</option><option>Not Verified</option></select></div>`}
function readFilter(id){return (document.getElementById(id)?.value||'').toLowerCase()}
function renderBackend(){kPending.innerText=pending.length;kProperty.innerText=propertyMaster.length;kArea.innerText=areaMaster.length;kCompletion.innerText=Math.round(propertyMaster.reduce((s,x)=>s+completion(x),0)/Math.max(1,propertyMaster.length))+'%';if(activeTab==='pending')renderPending();if(activeTab==='property')renderProperty();if(activeTab==='area')renderArea();if(activeTab==='hidden')renderHidden();if(activeTab==='archived')renderArchived()}
function renderProperty(){let q=readFilter('pfSearch'),cat=readFilter('pfCat'),st=readFilter('pfState'),sub=readFilter('pfSub'),comp=readFilter('pfComplete'),map=readFilter('pfMap');let rows=propertyMaster.filter(x=>{let text=(x.name+' '+(x.aliases||[]).join(' ')+' '+addr(x)).toLowerCase();let ok=!q||text.includes(q);ok=ok&&(!cat||categoryShort(x).toLowerCase()===cat);ok=ok&&(!st||(x.state||'').toLowerCase()===st);ok=ok&&(!sub||(x.type||'').toLowerCase()===sub);ok=ok&&(!map||(x.map||'').toLowerCase()===map);if(comp==='100')ok=ok&&completion(x)>=100;if(comp==='not100')ok=ok&&completion(x)<100;if(comp==='low')ok=ok&&completion(x)<80;return ok});backendContent.innerHTML=`${filterHtmlProperty()}<div class="note"><b>Property Name Master:</b> Confirmed project/property names. Merge should be completed from Pending / Merge Needed. Approved records are not deleted; use Archive to keep history.</div><div class="table-wrap"><table><thead><tr><th>Property ID</th><th>Name</th><th>Record Category</th><th>Type of Property</th><th>Address</th><th>Map</th><th>Property Type</th><th>Completion</th><th>Used</th><th>Action</th></tr></thead><tbody>${rows.map(x=>`<tr><td><b>${x.id}</b></td><td>${x.name}<div class="muted">Aliases: ${(x.aliases||[]).join(', ')||'-'}</div></td><td>${x.recordCategory||'Property Name'}</td><td><b>${x.type}</b></td><td>${addr(x)}</td><td>${x.map||'Not Verified'}</td><td>${categoryShort(x)}</td><td><div class="progress"><span style="width:${completion(x)}%"></span></div><span class="small-muted">${completion(x)}%</span></td><td>${usedCount(x)}</td><td><div class="mini-actions"><button class="btn light small" onclick="openEdit('${x.id}','property')">Edit</button><button class="btn red small" onclick="confirmArchive('${x.id}','property')">Archive</button></div></td></tr>`).join('')}</tbody></table></div>`}
function filterHtmlArea(){return `<div class="filter-panel area"><input id="afSearch" placeholder="Search area / township name" oninput="renderArea()"><select id="afRC" onchange="renderArea()"><option value="">Record Category</option><option>City / Area</option><option>Township</option></select><select id="afState" onchange="renderArea()"><option value="">All States</option>${[...new Set(areaMaster.map(x=>x.state).filter(Boolean))].map(x=>`<option>${x}</option>`).join('')}</select><select id="afUsed" onchange="renderArea()"><option value="">Used</option><option value="0">0</option><option value="1-50">1-50</option><option value="51-200">51-200</option><option value="200+">200+</option></select></div>`}
function renderArea(){let q=readFilter('afSearch'),rc=readFilter('afRC'),st=readFilter('afState'),used=readFilter('afUsed');let rows=areaMaster.filter(x=>{let u=Number(x.used||0);let ok=!q||((x.name+' '+(x.aliases||[]).join(' ')+' '+addr(x)).toLowerCase().includes(q));ok=ok&&(!rc||(x.recordCategory||'').toLowerCase()===rc);ok=ok&&(!st||(x.state||'').toLowerCase()===st);if(used==='0')ok=ok&&u===0;if(used==='1-50')ok=ok&&u>=1&&u<=50;if(used==='51-200')ok=ok&&u>=51&&u<=200;if(used==='200+')ok=ok&&u>200;return ok});backendContent.innerHTML=`${filterHtmlArea()}<div class="note"><b>Area & Township Master:</b> Backend classification only. Users still create property listings and select Property Sub Type.</div><div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Record Category</th><th>Address Hierarchy</th><th>Aliases</th><th>Used</th><th>Action</th></tr></thead><tbody>${rows.map(x=>`<tr><td><b>${x.id}</b></td><td>${x.name}</td><td>${x.recordCategory}</td><td>${addr(x)}</td><td>${(x.aliases||[]).join(', ')||'-'}</td><td>${x.used||0}</td><td><div class="mini-actions"><button class="btn light small" onclick="openEdit('${x.id}','area')">Edit</button><button class="btn red small" onclick="confirmArchive('${x.id}','area')">Archive</button></div></td></tr>`).join('')}</tbody></table></div>`}
function renderPending(){backendContent.innerHTML=`<div class="note"><b>Review rule:</b> Type Title always displays the user's selected Property Sub Type from Create Listing. Backend classifies the name into Property Name, City / Area, or Township.</div><div class="table-wrap"><table><thead><tr><th>Status</th><th>Detected Name</th><th>Suggested Match</th><th>Type Title</th><th>Address</th><th>Completion</th><th>Action</th></tr></thead><tbody>${pending.map(p=>{let m=findMatch(p);return `<tr><td><span class="status ${p.status.includes('Merge')?'merge':'pending'}">${p.status}</span></td><td><b>${p.name}</b><div class="muted">${p.source}</div></td><td>${m?`<span class="badge match">${p.status.includes('Merge')?'88':'72'}% match</span><div class="muted">${m.id} · ${m.name}</div>`:'<span class="muted">No reliable match</span>'}</td><td><b>${p.type}</b></td><td>${addr(p)}</td><td><div class="progress"><span style="width:${completion(p)}%"></span></div><span class="small-muted">${completion(p)}%</span></td><td><button class="btn blue small" onclick="openReview('${p.pid}')">Review & Classify</button></td></tr>`}).join('')}</tbody></table></div>`}
function variantList(p){return `<div class="alias-grid">${p.variants.map((v,i)=>{let key=p.pid+'_'+i;let confirmed=variantConfirmState[key]||false;let actionText=confirmed?'Edit':'Confirm';let klass=v[2]==='hide'?'hidden-item':'';return `<div class="alias-row ${klass}"><div><b>${v[0]}</b><div class="muted">${v[1]}</div></div><select onchange="variantConfirmState['${key}']=false; this.nextElementSibling.textContent='Confirm'; this.nextElementSibling.classList.add('pending')"><option value="alias" ${v[2]==='alias'?'selected':''}>Same Property Name / Add as Alias</option><option value="new" ${v[2]==='new'?'selected':''}>Different Property</option><option value="area" ${v[2]==='area'?'selected':''}>City / Area Name</option><option value="street" ${v[2]==='street'?'selected':''}>Township Name</option><option value="hide" ${v[2]==='hide'?'selected':''}>Not Property / Hide Suggestion</option></select><button type="button" class="confirm-action ${confirmed?'':'pending'}" onclick="toggleVariantConfirm('${key}',this)">${actionText}</button></div>`}).join('')}</div>`}
function toggleVariantConfirm(key,btn){variantConfirmState[key]=!variantConfirmState[key];btn.textContent=variantConfirmState[key]?'Edit':'Confirm';btn.classList.toggle('pending',!variantConfirmState[key])}
function aliasManager(x,kind){let alias=(x.aliases||[]);let hid=(x.hidden||[]);if(kind==='area')hid=[];return `<div class="section-title">Alias / Hidden Name Management</div><div class="grid2"><div><label>Aliases</label><div class="alias-grid">${alias.map((a,i)=>`<div class="alias-row"><div><b>${a}</b><div class="muted">Search alias for ${x.name}</div></div><select><option>Same Property Name / Add as Alias</option><option>Different Property</option><option>City / Area Name</option><option>Township Name</option><option>Not Property / Hide Suggestion</option></select><button class="confirm-action" type="button">Edit</button></div>`).join('')||'<div class="empty">No aliases yet.</div>'}</div><input id="eAliases" value="${alias.join(', ')}" placeholder="Add aliases separated by comma"></div><div><label>Hidden / Not Property Names</label><div class="alias-grid">${hid.map(h=>`<div class="alias-row hidden-item"><div><b>${h}</b><div class="muted">Hidden from frontend search</div></div><select><option>Not Property / Hide Suggestion</option><option>Same Property Name / Add as Alias</option></select><button class="confirm-action" type="button">Edit</button></div>`).join('')||'<div class="empty">No hidden names.</div>'}</div><input id="eHidden" value="${hid.join(', ')}" placeholder="Add hidden names separated by comma"></div></div>`}
function openEdit(id,kind){let list=kind==='property'?propertyMaster:areaMaster;let x=list.find(i=>i.id===id);openModal('Edit Record: '+x.name,'Approved records remain editable. Archive keeps data history instead of deleting it.',`${baseFields('e',x,x.recordCategory)}${kind==='property'?propertyForm('e',x.details):''}${aliasManager(x,kind)}<div class="form-actions"><button class="btn green" onclick="saveEdit('${id}','${kind}')">Save Changes</button><button class="btn red" onclick="confirmArchive('${id}','${kind}')">Archive Record</button></div>`);if(kind==='property')initPropertyDropdown('e',x.details);categoryChange('e')}
function confirmArchive(id,kind){let list=kind==='property'?propertyMaster:areaMaster;let x=list.find(i=>i.id===id);openModal('Archive Record: '+x.name,'This will not delete the data. It will move the record into Archived Records and hide it from frontend search.',`<div class="danger-note"><b>Archive confirmation</b><br>This record will be hidden from frontend search and Create Listing suggestions. Existing listing history will remain linked. You can restore it later from Archived Records.</div><label>Reason for archive</label><textarea id="archiveReason" placeholder="e.g. duplicate, wrong location, not valid property master"></textarea><div class="form-actions"><button class="btn light" onclick="closeModal()">Cancel</button><button class="btn red" onclick="archiveRecord('${id}','${kind}')">Confirm Archive</button></div>`)}
function archiveRecord(id,kind){let list=kind==='property'?propertyMaster:areaMaster;let x=list.find(i=>i.id===id);let reason=document.getElementById('archiveReason')?.value||'Archived master record';archivedRecords.push({...x,archiveKind:kind,archiveReason:reason,archivedAt:new Date().toLocaleString(),archivedBy:'Backend Admin'});if(kind==='property')propertyMaster=propertyMaster.filter(i=>i.id!==id);else areaMaster=areaMaster.filter(i=>i.id!==id);closeModal();renderBackend()}
function renderArchived(){backendContent.innerHTML=`<div class="note"><b>Archived Records:</b> Records are never deleted. They are hidden from frontend search but kept for audit, recovery and historical listing reference.</div><div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Reason</th><th>Archived By</th><th>Date</th><th>Action</th></tr></thead><tbody>${archivedRecords.map((x,i)=>`<tr class="archived-row"><td><b>${x.id||'-'}</b></td><td>${x.name}</td><td>${x.archiveKind}</td><td>${x.archiveReason}</td><td>${x.archivedBy}</td><td>${x.archivedAt}</td><td><button class="btn green small" onclick="restoreArchived(${i})">Restore</button></td></tr>`).join('')||'<tr><td colspan="7" class="empty">No archived records yet.</td></tr>'}</tbody></table></div>`}
function restoreArchived(i){let x=archivedRecords[i];if(x.archiveKind==='property')propertyMaster.push(x);else areaMaster.push(x);archivedRecords.splice(i,1);renderBackend()}
function saveEdit(id,kind){let list=kind==='property'?propertyMaster:areaMaster;let x=list.find(i=>i.id===id);let rec=collectReview('e');Object.assign(x,rec);x.aliases=(document.getElementById('eAliases')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);x.hidden=(document.getElementById('eHidden')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);closeModal();renderBackend()}
function approveReview(pid){let p=pending.find(x=>x.pid===pid);let rec=collectReview('r');if(rec.recordCategory==='Property Name'){rec.id=nextPropertyId(rec);rec.map='Not Verified';rec.aliases=p.variants.filter(v=>v[2]==='alias').map(v=>v[0]);rec.hidden=p.variants.filter(v=>v[2]==='hide').map(v=>v[0]);rec.used=1;propertyMaster.push(rec)}else{rec.id='MYD-AREA-'+stateCode(rec.state)+'-'+String(areaMaster.length+1).padStart(5,'0');rec.typeNote=rec.recordCategory;rec.used=1;rec.aliases=p.variants.filter(v=>v[2]==='area'||v[2]==='street').map(v=>v[0]);areaMaster.push(rec)}pending=pending.filter(x=>x.pid!==pid);closeModal();renderBackend()}
function createMaster(){let rec=collectReview('a');if(rec.recordCategory==='Property Name'){rec.id=nextPropertyId(rec);rec.aliases=[];rec.hidden=[];rec.map='Not Verified';rec.used=0;propertyMaster.push(rec)}else{rec.id='MYD-AREA-'+stateCode(rec.state)+'-'+String(areaMaster.length+1).padStart(5,'0');rec.typeNote=rec.recordCategory;rec.aliases=[];rec.used=0;areaMaster.push(rec)}closeModal();locDBShowPage('backend');renderBackend()}




function renderLocation(){
  page.innerHTML = head('Location Approval Center & Property Database Governance','Backend approval from MYD Property Database V8: approve new property names, merge duplicates, classify City / Area / Township, manage aliases, hidden names, archive and restore.') + `
    <div class="grid4" style="margin-top:8px">
      <div class="card kpi"><div class="label">Pending Review</div><div class="num" id="kPending">0</div><div class="trend warn">Need classify / merge</div></div>
      <div class="card kpi"><div class="label">Property Name Master</div><div class="num" id="kProperty">0</div><div class="trend up">Approved records</div></div>
      <div class="card kpi"><div class="label">Area & Township</div><div class="num" id="kArea">0</div><div class="trend up">Location hierarchy</div></div>
      <div class="card kpi"><div class="label">Average Completion</div><div class="num" id="kCompletion">0%</div><div class="trend up">Master data quality</div></div>
    </div>

        <button class="${activeTab==='pending'?'on':''}" onclick="setTab('pending',event)">Pending / Merge Needed</button>
        <button class="${activeTab==='property'?'on':''}" onclick="setTab('property',event)">Property Name Master</button>
        <button class="${activeTab==='area'?'on':''}" onclick="setTab('area',event)">Area & Township Master</button>
        <button class="${activeTab==='hidden'?'on':''}" onclick="setTab('hidden',event)">Hidden / Not Property Names</button>
        <button class="${activeTab==='archived'?'on':''}" onclick="setTab('archived',event)">Archived Records</button>
      </div>
      <button class="btn green" onclick="openAddMaster()">+ Add New Master</button>

    <div id="backendContent"></div>`;
  renderBackend();
}
